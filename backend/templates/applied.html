<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Status</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Page Background */
        body {
            background: #eef2f6;
            font-family: "Poppins", sans-serif;
            color: #2d2d2d;
            padding-top: 80px;
            text-align: center;
        }

        /* Status Box */
        .status-box {
            background: #ffffff;
            padding: 35px 40px;
            max-width: 600px;
            margin: auto;
            border-radius: 14px;
            border: 1px solid #d6dce2;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        /* Heading */
        .status-title {
            color: #0a3d62;
            font-weight: 700;
            font-size: 26px;
        }

        /* Success Tick */
        .tick {
            font-size: 48px;
            color: #0a3d62;
            font-weight: bold;
        }

        /* Message Text */
        .status-msg {
            margin-top: 15px;
            font-size: 15px;
            color: #444;
        }

        /* Home Button */
        .btn-home {
            background: #0a3d62;
            color: #fff;
            border-radius: 8px;
            padding: 10px 22px;
            font-weight: 600;
            border: none;
            margin-top: 25px;
        }

        .btn-home:hover {
            background: #083654;
        }
    </style>
</head>
<body>

<div class="status-box">
    <div class="tick">✔</div>
    <h2 class="status-title">Application Submitted Successfully</h2>

    <p class="status-msg">Your application has been received.</p>
    <p class="status-msg">We will notify you soon regarding your selection status.</p>
    <p class="status-msg">Thank you for using our platform.</p>

    <a href="/" class="btn-home">Go to Home</a>
</div>

</body>
</html>
