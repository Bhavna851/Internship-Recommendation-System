<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Internship Recommendation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
/* ------------------- BODY ------------------- */
body {
    background: #f4f6f8;
    font-family: "Poppins", sans-serif;
    color: #1f2937;
    padding: 40px 15px;
}

/* ------------------- CONTAINER ------------------- */
.container {
    max-width: 750px;
    margin: 0 auto;
}

/* ------------------- HEADER ------------------- */
.page-header {
    text-align: center;
    margin-bottom: 30px;
}

.page-header h1 {
    color: #0d3b66;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

.page-header p {
    color: #4b5563;
    font-size: 14px;
}

/* ------------------- FORM CARD ------------------- */
.card-form {
    background: #ffffff;
    border-radius: 15px;
    padding: 30px 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    border: 1px solid #d1d5db;
    transition: 0.3s ease;
}

.card-form:hover {
    box-shadow: 0 12px 25px rgba(0,0,0,0.08);
}

/* ------------------- LABELS ------------------- */
label {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
    display: block;
    color: #374151;
}

/* ------------------- FORM CONTROLS ------------------- */
.form-control, select {
    background: #f9fafb;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    color: #111827;
    transition: all 0.25s ease;
}

.form-control:focus, select:focus {
    border-color: #0d3b66;
    box-shadow: 0 0 0 0.2rem rgba(13,59,102,0.25);
    background: #fff;
}

/* ------------------- BUTTON ------------------- */
.btn-submit {
    width: 100%;
    background: #0d3b66;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-size: 16px;
    font-weight: 600;
    margin-top: 20px;
    transition: 0.3s;
}

.btn-submit:hover {
    background: #1e4f8f;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(13,59,102,0.3);
}

/* ------------------- HIDDEN INPUT ------------------- */
.hidden-input {
    display: none;
    margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">
    <div class="page-header">
        <h1>Candidate Information</h1>
        <p>Fill in the details to get internship recommendations</p>
    </div>

    <div class="card-form">
        <form id="internForm" enctype="multipart/form-data" method="POST" action="/recommend">
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <label>Full Name</label>
                    <input name="name" class="form-control" placeholder="Your full name" required>
                </div>

                <div class="col-12 col-md-6">
                    <label>Upload Resume (PDF)</label>
                    <input type="file" name="resume" accept=".pdf" class="form-control">
                </div>

                <div class="col-12">
                    <label>Skills</label>
                    <input name="skills" class="form-control" placeholder="Python, SQL, ML">
                </div>

                <div class="col-12 col-md-6">
                    <label>Education</label>
                    <select name="education" class="form-control" id="educationSelect">
                        <option value="">Select</option>
                        <option>B.Tech</option>
                        <option>B.E</option>
                        <option>B.Sc</option>
                        <option>BCA</option>
                        <option>MCA</option>
                        <option>M.Tech</option>
                        <option>Other</option>
                    </select>
                    <input type="text" name="education_other" id="educationOther" class="form-control hidden-input" placeholder="Enter your education">
                </div>

                <div class="col-12 col-md-6">
                    <label>Preferred Location</label>
                    <select name="location" class="form-control" id="locationSelect">
                        <option value="">Select location</option>
                        <option>Delhi</option>
                        <option>Mumbai</option>
                        <option>Bangalore</option>
                        <option>Hyderabad</option>
                        <option>Chennai</option>
                        <option>Pune</option>
                        <option>Kolkata</option>
                        <option>Noida</option>
                        <option>Other</option>
                    </select>
                    <input type="text" name="location_other" id="locationOther" class="form-control hidden-input" placeholder="Enter your location">
                </div>
            </div>

            <button class="btn-submit" type="submit">Get Recommendations</button>
        </form>
    </div>
</div>

<script>
document.getElementById('educationSelect').addEventListener('change', function() {
    const other = document.getElementById('educationOther');
    if(this.value === 'Other') other.style.display = 'block';
    else other.style.display = 'none';
});

document.getElementById('locationSelect').addEventListener('change', function() {
    const other = document.getElementById('locationOther');
    if(this.value === 'Other') other.style.display = 'block';
    else other.style.display = 'none';
});
</script>

</body>
</html>
